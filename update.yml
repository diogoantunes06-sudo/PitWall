name: Atualizar dados PitWall

on:
  schedule:
    # Toda segunda-feira às 06:00 UTC (03:00 horário de Brasília)
    - cron: '0 6 * * 1'
  # Permite rodar manualmente pelo GitHub
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Rodar script de atualização
        run: python scripts/update_data.py

      - name: Commitar dados atualizados
        run: |
          git config --local user.email "pitwall-bot@users.noreply.github.com"
          git config --local user.name "PitWall Bot"
          git add data/
          git diff --staged --quiet || git commit -m "chore: atualiza dados automaticamente [$(date +'%Y-%m-%d')]"
          git push
